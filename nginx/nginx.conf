events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=telegram:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.hvsold.com widget.hvsold.com dashclaw.hvsold.com;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── api.hvsold.com ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Fello webhooks — all 9 event types → single handler
        location /webhooks/fello {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass http://172.17.0.1:8100/webhooks/fello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        # FUB webhooks — 8 event types → MCP interceptor
        location /webhooks/fub {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass http://172.17.0.1:8000/webhooks/fub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        # Telegram webhook → Hermes gateway
        location /webhooks/telegram {
            limit_req zone=telegram burst=10 nodelay;
            proxy_pass http://172.17.0.1:8000/webhook/telegram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 5s;
        }

        # MCP interceptor API
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://172.17.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://172.17.0.1:8000/health;
            access_log off;
        }
    }

    # ── dashclaw.hvsold.com — DashClaw Governance Runtime ────────────────────
    server {
        listen 443 ssl;
        server_name dashclaw.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Telegram approval callbacks (dedicated DashClaw bot, separate from Hermes)
        location /api/telegram/webhook {
            limit_req zone=telegram burst=20 nodelay;
            proxy_pass http://172.17.0.1:3000/api/telegram/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 5s;
        }

        # DashClaw Next.js app — dashboard, decisions, approvals, SSE
        location / {
            proxy_pass http://172.17.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ── widget.hvsold.com ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name widget.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

        # FUB Embedded App — loads inside FUB iframe
        root /var/www/widget;
        index index.html;

        location /fub-embedded/widget/ {
            try_files $uri $uri/ /fub-embedded/widget/index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Widget API → MCP Interceptor widget path
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://172.17.0.1:8000/widget/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 20m;
            proxy_read_timeout 30s;
        }
    }
}
