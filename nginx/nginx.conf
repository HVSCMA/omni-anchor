user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/conf.d/*.conf;

    # Nginx reverse proxy for MCP Interceptor (Python API Gateway)
    server {
        listen 8000; # Host-exposed port
        server_name _; # Catch-all server name for internal proxies

        location / {
            proxy_pass http://92.112.184.45:8000; # Direct host IP and port
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Nginx reverse proxy for Fello Webhook Service
    server {
        listen 8100;
        server_name _; # Catch-all server name for internal proxies

        location / {
            proxy_pass http://92.112.184.45:8100; # Direct host IP and port
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name api.hvsold.com widget.hvsold.com dashclaw.hvsold.com assistant.hvsold.com;
        # Allow Let's Encrypt to use .well-known (cert auto-renewal)
        location /.well-known/acme-challenge/ { root /var/www/html; }
        return 301 https://$host$request_uri;
    }

    # HTTPS server block for assistant.hvsold.com (Google Assistant Webhook)
    server {
        listen 443 ssl;
        server_name assistant.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem; # Cloudflare wildcard cert
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;  # Cloudflare wildcard cert
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

        location / {
            proxy_pass http://127.0.0.1:5001; # Proxy to Gunicorn
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_read_timeout 90;
        }
    }

    # HTTPS server block for api.hvsold.com
    server {
        listen 443 ssl;
        server_name api.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

        # Fello webhooks — all 9 event types → single handler
        location /webhooks/fello {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass http://92.112.184.45:8100/webhooks/fello;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        # FUB webhooks — 8 event types → MCP interceptor
        location /webhooks/fub {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass http://92.112.184.45:8000/webhooks/fub; # Proxy to MCP Interceptor
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }

        # API requests handled by MCP Interceptor
        location / {
            proxy_pass http://92.112.184.45:8000; # Proxy to MCP Interceptor
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }
    }

    # HTTPS server block for widget.hvsold.com
    server {
        listen 443 ssl;
        server_name widget.hvsold.com;

        ssl_certificate     /etc/letsencrypt/live/hvsold.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvsold.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-api-key" always;

        root /var/www/widget; # Root for all widget.hvsold.com content
        index index.html;

        # Specific location for FUB Embedded App
        location /fub-embedded/widget/ {
            alias /var/www/widget/fub-embedded/widget/;
            try_files $uri $uri/index.html =404; # Serve index.html if directory is requested
        }

        # Location for audio resources
        location /resources/audio/ {
            alias /var/www/widget/resources/audio/;
            autoindex on; # Optional: enable directory listing
        }

        # Default location for widget.hvsold.com
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
